<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Pro: Career Master</title>
    <style>
        :root {
            --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c;
            --blue: #3498db; --dark: #1a1a2e; --panel: #16213e;
            --text: #e9ecef;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Layout Sections */
        .sidebar { width: 350px; background: var(--panel); padding: 20px; border-right: 2px solid #0f3460; overflow-y: auto; }
        .main-hub { flex: 1; padding: 25px; overflow-y: auto; background: radial-gradient(circle at top, #1b262c 0%, #0f1a20 100%); }
        .right-bar { width: 380px; background: var(--panel); padding: 20px; border-left: 2px solid #0f3460; overflow-y: auto; }

        /* UI Elements */
        .card { background: #0f3460; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #16213e; }
        h2, h3 { color: var(--gold); margin-bottom: 15px; text-transform: uppercase; font-size: 1rem; letter-spacing: 1px; }
        
        .ovr-badge { background: var(--gold); color: #000; width: 70px; height: 70px; border-radius: 50%; 
                     display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; margin: 0 auto 10px; border: 4px solid #fff; }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; padding-bottom: 4px; border-bottom: 1px solid #ffffff05; }
        .val { color: var(--green); font-weight: bold; }

        /* Training Slots */
        .training-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .train-item { background: #16213e; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #ffffff10; }
        .progress-bg { width: 100%; height: 6px; background: #000; border-radius: 3px; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.1s linear; }

        /* Match Engine */
        #match-log { background: #000; height: 250px; border-radius: 8px; padding: 15px; overflow-y: auto; 
                     font-family: 'Courier New', monospace; font-size: 0.85rem; color: #00ff00; border: 2px solid #16213e; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid #222; padding-left: 10px; }

        /* League Table */
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { text-align: left; color: #888; padding-bottom: 5px; }
        td { padding: 5px 0; border-bottom: 1px solid #ffffff05; }

        /* Controls */
        input, select { background: #1a1a2e; border: 1px solid #3498db; color: white; padding: 8px; border-radius: 4px; width: 100%; margin-bottom: 10px; }
        button { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.2s; }
        button:hover:not(:disabled) { background: #2980b9; transform: translateY(-1px); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-action { background: var(--green); color: #000; margin-top: 10px; height: 50px; font-size: 1.1rem; }
        
        .energy-bar { height: 20px; background: #000; border-radius: 10px; overflow: hidden; position: relative; margin-bottom: 10px; }
        .energy-fill { height: 100%; background: linear-gradient(90deg, #e74c3c, #2ecc71); width: 100%; transition: 0.5s; }

        .shop-card { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #0f3460; margin-bottom: 8px; border-radius: 6px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="card" style="text-align: center;">
        <div class="ovr-badge" id="ovr-text">10</div>
        <input type="text" id="player-name" value="Wonderkid" onchange="updateProfile()">
        <select id="player-pos" onchange="updateProfile()">
            <option value="ST">ST - Striker</option>
            <option value="CAM">CAM - Playmaker</option>
            <option value="CB">CB - Defender</option>
            <option value="GK">GK - Goalkeeper</option>
        </select>
        <p style="color:var(--gold); font-size: 0.8rem;">Value: €<span id="market-val">0</span></p>
    </div>

    <div class="card">
        <h3>Fitness & Bank</h3>
        <div class="energy-bar"><div class="energy-fill" id="energy-fill"></div></div>
        <div class="stat-row"><span>Energy</span><span id="energy-text">100/100</span></div>
        <div class="stat-row"><span>Bank Balance</span><span class="val">€<span id="bank-val">0</span></span></div>
        <button onclick="restDay()" style="background: var(--panel); border: 1px solid var(--blue);">Rest (Full Recovery)</button>
    </div>

    <div class="card">
        <h3>Attributes</h3>
        <div id="attr-list"></div>
    </div>
</div>

<div class="main-hub">
    <div class="card" style="background: rgba(0,0,0,0.3);">
        <h2 id="match-header">Next Match: Week 1</h2>
        <div id="match-log">
            <div class="log-entry">> Welcome to the League. Manage your energy and train your stats to promote.</div>
        </div>
        <button class="btn-action" id="match-btn" onclick="playMatch()">PLAY LEAGUE MATCH (-25 Energy)</button>
    </div>

    <h3>Training Center (Max 2 Active Slots)</h3>
    <div class="training-grid" id="training-grid"></div>
</div>

<div class="right-bar">
    <div class="card">
        <h3>League Table (Div 1)</h3>
        <table>
            <thead><tr><th>#</th><th>Team</th><th>W-D-L</th><th>Pts</th></tr></thead>
            <tbody id="league-table"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>Equipment & Shop</h3>
        <div id="shop-list"></div>
    </div>
</div>

<script>
    // --- STATE ---
    let p = {
        name: "Wonderkid", pos: "ST", bank: 500, energy: 100, 
        stats: { shooting: 10, passing: 10, dribbling: 10, defending: 10, pace: 10, physical: 10 },
        equipped: [],
        activeTrainings: 0,
        week: 1, w:0, d:0, l:0, pts:0
    };

    const teams = [
        "Limerick City", "Dublin Rovers", "Cork Athletic", "Galway Utd", "Manchester Blue", 
        "London Red", "Madrid White", "Munich FC", "Paris SG", "Milan Stars",
        "Belfast Celtic", "Waterford FC", "Derry City", "Shelbourne", "Shamrock",
        "Sligo Rovers", "Dundalk", "Finn Harps", "St Pats", "Wexford FC"
    ].map(name => ({ name, pts: Math.floor(Math.random() * 3), w:0, d:0, l:0 }));

    const shopItems = [
        { name: "Pro Boots", price: 300, stat: "shooting", boost: 5 },
        { name: "Lightweight Pads", price: 250, stat: "pace", boost: 5 },
        { name: "GPS Vest", price: 400, stat: "physical", boost: 8 },
        { name: "Golden Gloves", price: 500, stat: "defending", boost: 10 }
    ];

    // --- INITIALIZE ---
    function init() {
        const grid = document.getElementById('training-grid');
        Object.keys(p.stats).forEach(s => {
            grid.innerHTML += `
                <div class="train-item">
                    <h4 style="text-transform:capitalize">${s}</h4>
                    <div class="val" id="stat-${s}">${p.stats[s]}</div>
                    <div class="progress-bg"><div class="progress-fill" id="fill-${s}"></div></div>
                    <button onclick="startTraining('${s}')" id="btn-${s}">Train (-10 Energy)</button>
                </div>
            `;
        });

        const shop = document.getElementById('shop-list');
        shopItems.forEach((item, idx) => {
            shop.innerHTML += `
                <div class="shop-card">
                    <span>${item.name} (+${item.boost} ${item.stat})</span>
                    <button onclick="buyItem(${idx})" style="width:70px; padding:5px;">€${item.price}</button>
                </div>
            `;
        });

        updateUI();
        updateLeague();
    }

    // --- CORE LOGIC ---
    function updateProfile() {
        p.name = document.getElementById('player-name').value;
        p.pos = document.getElementById('player-pos').value;
        updateUI();
    }

    function calculateOVR() {
        let sum = Object.values(p.stats).reduce((a,b) => a+b);
        p.equipped.forEach(i => sum += i.boost);
        return Math.floor(sum / 6);
    }

    function updateUI() {
        const ovr = calculateOVR();
        document.getElementById('ovr-text').innerText = ovr;
        document.getElementById('bank-val').innerText = p.bank;
        document.getElementById('market-val').innerText = (ovr * 150000).toLocaleString();
        document.getElementById('energy-text').innerText = `${Math.floor(p.energy)}/100`;
        document.getElementById('energy-fill').style.width = p.energy + "%";

        Object.keys(p.stats).forEach(s => {
            document.getElementById(`stat-${s}`).innerText = p.stats[s];
            const btn = document.getElementById(`btn-${s}`);
            btn.disabled = (p.activeTrainings >= 2 || p.energy < 10);
        });

        document.getElementById('match-btn').disabled = (p.energy < 25);
    }

    function restDay() {
        p.energy = 100;
        p.week++;
        document.getElementById('match-header').innerText = `Next Match: Week ${p.week}`;
        updateUI();
        logMatch("Spent the week resting. Energy fully recovered.", "#3498db");
    }

    function startTraining(stat) {
        if(p.activeTrainings >= 2 || p.energy < 10) return;

        p.activeTrainings++;
        p.energy -= 10;
        const btn = document.getElementById(`btn-${stat}`);
        const fill = document.getElementById(`fill-${stat}`);
        
        btn.disabled = true;
        updateUI();

        let progress = 0;
        const duration = 100 + (p.stats[stat] * 5); // Harder as you improve
        const interval = setInterval(() => {
            progress += 1;
            fill.style.width = progress + "%";
            if(progress >= 100) {
                clearInterval(interval);
                p.stats[stat]++;
                p.activeTrainings--;
                fill.style.width = "0%";
                updateUI();
            }
        }, duration / 10);
    }

    // --- MATCH ENGINE ---
    function playMatch() {
        if(p.energy < 25) return;
        p.energy -= 25;
        const btn = document.getElementById('match-btn');
        btn.disabled = true;

        const logEl = document.getElementById('match-log');
        logEl.innerHTML = "";
        
        let myScore = 0;
        let oppScore = 0;
        const opp = teams[p.week % teams.length];
        const myOvr = calculateOVR();

        let min = 0;
        const engine = setInterval(() => {
            min += 10;
            const entry = document.createElement('div');
            entry.className = "log-entry";

            // Tactical Roll
            let chance = Math.random() * 100;
            let success = 30 + (myOvr - 15); // Base difficulty is 15 OVR

            if(chance < 15) {
                if(Math.random() * 100 < success) {
                    myScore++;
                    entry.innerHTML = `<span style="color:var(--gold)">${min}' - GOAL! ${p.name} scores a screamer!</span>`;
                } else { entry.innerText = `${min}' - You hit the post! So close.`; }
            } else if (chance > 85) {
                if(Math.random() * 100 > success + 10) {
                    oppScore++;
                    entry.innerHTML = `<span style="color:var(--red)">${min}' - GOAL for ${opp.name}. Defense beaten.</span>`;
                } else { entry.innerText = `${min}' - Great defensive block by the team.`; }
            } else {
                entry.innerText = `${min}' - Midfield stalemate. Intense pressure.`;
            }

            logEl.prepend(entry);

            if(min >= 90) {
                clearInterval(engine);
                finalizeMatch(myScore, oppScore, opp);
                btn.disabled = false;
            }
        }, 300);
    }

    function finalizeMatch(me, oppScore, oppTeam) {
        p.week++;
        let earnings = 50;
        if(me > oppScore) {
            p.pts += 3; p.w++; earnings = 250;
            logMatch(`VICTORY! ${me}-${oppScore} vs ${oppTeam.name}. +€250`, "var(--green)");
        } else if (me == oppScore) {
            p.pts += 1; p.d++; earnings = 100;
            logMatch(`DRAW. ${me}-${oppScore} vs ${oppTeam.name}. +€100`, "var(--gold)");
        } else {
            p.l++; earnings = 20;
            logMatch(`DEFEAT. ${me}-${oppScore} vs ${oppTeam.name}. +€20`, "var(--red)");
        }
        p.bank += earnings;
        
        // Sim other teams
        teams.forEach(t => { if(t.name !== "YOU") t.pts += (Math.random() > 0.6 ? 3 : 1); });
        
        document.getElementById('match-header').innerText = `Next Match: Week ${p.week}`;
        updateUI();
        updateLeague();
    }

    function logMatch(msg, color) {
        const logEl = document.getElementById('match-log');
        logEl.innerHTML = `<div class="log-entry" style="color:${color}; border-left-color:${color}; font-weight:bold;">> ${msg}</div>` + logEl.innerHTML;
    }

    function updateLeague() {
        const table = document.getElementById('league-table');
        const sorted = [
            { name: "YOU", pts: p.pts, w: p.w, d: p.d, l: p.l },
            ...teams
        ].sort((a,b) => b.pts - a.pts);

        table.innerHTML = sorted.map((t, idx) => `
            <tr style="${t.name === 'YOU' ? 'background:rgba(52, 152, 219, 0.2)' : ''}">
                <td>${idx+1}</td>
                <td>${t.name}</td>
                <td>${t.w || 0}-${t.d || 0}-${t.l || 0}</td>
                <td><b>${t.pts}</b></td>
            </tr>
        `).join('');
    }

    function buyItem(idx) {
        const item = shopItems[idx];
        if(p.bank >= item.price) {
            p.bank -= item.price;
            p.equipped.push(item);
            alert(`Equipped ${item.name}! OVR increased.`);
            updateUI();
        } else {
            alert("Not enough money in the bank!");
        }
    }

    init();
</script>
</body>
</html>
