<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALL PRO: WORLD TOUR (MASTER EDITION)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- BATCH 1: ELITE UI FRAMEWORK --- */
        :root {
            --primary: #00ff88; --secondary: #00d4ff; --accent: #ff0055;
            --bg-dark: #080a0c; --panel: rgba(255, 255, 255, 0.03);
            --gold: #ffcc00; --text-main: #f0f0f0; --border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
            background-image: radial-gradient(circle at 50% -20%, #1a2a22 0%, #080a0c 80%);
            user-select: none;
        }

        .nav-rail { width: 90px; background: rgba(0,0,0,0.4); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 40px; z-index: 100; }
        .nav-btn { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 1.4rem; border: 1px solid transparent; background: var(--panel); }
        .nav-btn:hover, .nav-btn.active { background: var(--primary); color: #000; transform: scale(1.1); box-shadow: 0 0 20px rgba(0,255,136,0.4); }

        .app-shell { flex: 1; display: grid; grid-template-columns: 380px 1fr 400px; gap: 1px; background: var(--border); position: relative; }
        .view-column { background: var(--bg-dark); padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        .profile-card { background: linear-gradient(145deg, #121619, #0a0c0e); border-radius: 24px; padding: 25px; border: 1px solid var(--border); position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;}
        .ovr-display { font-size: 5rem; font-weight: 900; color: var(--gold); line-height: 1; text-shadow: 0 0 30px rgba(255,204,0,0.3); }
        .pos-badge { position: absolute; top: 25px; right: 25px; background: var(--primary); color: #000; padding: 4px 12px; border-radius: 8px; font-weight: 900; font-size: 0.8rem; }

        .match-arena { width: 100%; height: 400px; background: #143d24; border-radius: 20px; border: 5px solid #234d34; position: relative; overflow: hidden; box-shadow: inset 0 0 100px rgba(0,0,0,0.5); }
        .pitch-mowing { position: absolute; width: 100%; height: 10%; background: rgba(0,0,0,0.05); }
        #ball { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; transition: 0.3s; z-index: 10; box-shadow: 0 0 10px #fff; left: 50%; top: 50%; }
        #player-sprite { width: 20px; height: 20px; background: var(--primary); border: 2px solid #fff; border-radius: 50%; position: absolute; transition: 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); z-index: 11; box-shadow: 0 0 15px var(--primary); left: 45%; top: 45%;}

        .attr-group { background: var(--panel); border-radius: 15px; padding: 15px; border: 1px solid var(--border); }
        .attr-header { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        .attr-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .attr-bar-bg { flex: 1; height: 6px; background: #000; border-radius: 3px; margin: 0 15px; overflow: hidden; }
        .attr-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 1.5s cubic-bezier(0.075, 0.82, 0.165, 1); }
        .train-mini-btn { background: none; border: 1px solid #444; color: #888; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .train-mini-btn:hover { color: var(--primary); border-color: var(--primary); }

        .btn-elite { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; width: 100%; }
        .btn-elite:hover:not(:disabled) { background: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,255,136,0.3); }
        .btn-elite:disabled { background: #222; color: #555; cursor: not-allowed; }

        .transfer-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: var(--panel); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .negotiate-btn { background: var(--primary); color: #000; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .decision-card { width: 500px; background: #121518; border: 1px solid var(--primary); padding: 40px; border-radius: 30px; text-align: center; }

        #news-bar { position:fixed; bottom:0; left:0; width:100%; height:40px; background:#000; border-top:1px solid var(--primary); display:flex; align-items:center; overflow:hidden; z-index:200; }
        @keyframes scrollText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<div class="nav-rail">
    <div class="nav-btn active" id="nav-hub" onclick="switchTab('hub')">🏠</div>
    <div class="nav-btn" id="nav-lifestyle" onclick="switchTab('lifestyle')">💎</div>
</div>

<div class="app-shell" id="main-view">
    <div class="view-column">
        <div class="profile-card">
            <div class="pos-badge" id="ui-pos">ST</div>
            <span style="color: #666; font-size: 0.7rem;">WORLD RANKING</span>
            <div class="ovr-display" id="ui-ovr">20</div>
            <h2 id="ui-name">WONDERKID</h2>
            <p id="ui-club" style="color: #888; font-size: 0.8rem; margin-top: 5px;">FREE AGENT</p>
        </div>
        <div class="attr-group">
            <span class="attr-header">Physicality</span>
            <div id="phys-stats"></div>
        </div>
        <div class="attr-group">
            <span class="attr-header">Technical</span>
            <div id="tech-stats"></div>
        </div>
    </div>

    <div class="view-column" id="center-hub">
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <p style="color: #666; font-size: 0.7rem;">CURRENT SEASON</p>
                <h1 style="font-size: 2.5rem;">WEEK <span id="ui-week">1</span></h1>
            </div>
            <div style="text-align: right;">
                <p style="color: var(--primary); font-weight: 900; font-size: 1.2rem;">€<span id="ui-bank">0</span></p>
                <p style="font-size: 0.7rem; color: #666;">WAGE: €<span id="ui-wage">0</span>/WK</p>
            </div>
        </div>
        <div class="match-arena" id="arena">
            <div id="ball"></div>
            <div id="player-sprite"></div>
            <div class="pitch-mowing" style="top:20%"></div>
            <div class="pitch-mowing" style="top:40%"></div>
            <div class="pitch-mowing" style="top:60%"></div>
            <div class="pitch-mowing" style="top:80%"></div>
        </div>
        <div id="feed" style="background: #000; border-radius: 15px; height: 180px; padding: 20px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; line-height: 1.6;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn-elite" onclick="controller.startMatchSimulation()" id="match-trigger">Play Fixture</button>
            <button class="btn-elite" style="background: #222; color: #fff;" onclick="controller.advanceTime()">Advance Week</button>
        </div>
    </div>

    <div class="view-column">
        <div class="attr-group" style="margin-bottom:0px; border-color:var(--primary);">
            <span class="attr-header">Active Competition</span>
            <h2 id="ui-league-name" style="font-size:1rem; color:white;">REGIONAL LEAGUE</h2>
        </div>
        <h3>TRANSFER MARKET</h3>
        <div id="market-list"></div>
        <h3>LEAGUE STANDINGS</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 0.8rem;">
            <tbody id="league-rows"></tbody>
        </table>
    </div>
</div>

<div id="tab-lifestyle" class="view-column" style="display:none; position:absolute; left:90px; right:0; top:0; bottom:40px; background: var(--bg-dark); z-index: 50; grid-template-columns: 1fr 1fr; display:none; gap:2px; background:#333;">
    <div style="background:var(--bg-dark); padding:40px;">
        <h2 style="color:var(--primary)">LUXURY SHOP</h2>
        <div id="lifestyle-list" style="margin-top:20px;"></div>
    </div>
    <div style="background:var(--bg-dark); padding:40px; text-align:center;">
        <h2 style="color:var(--gold)">BRAND POWER</h2>
        <div class="ovr-display" id="ui-followers" style="font-size:6rem; margin-top:30px;">0</div>
        <p>TOTAL FOLLOWERS</p>
    </div>
</div>

<div class="modal-overlay" id="modal-decision">
    <div class="decision-card">
        <h2 id="decision-title">NEGOTIATION</h2>
        <p id="decision-desc" style="margin:20px 0; color:#888;"></p>
        <div id="decision-options"></div>
    </div>
</div>

<div id="news-bar">
    <div style="background:var(--primary); color:#000; padding:0 20px; height:100%; display:flex; align-items:center; font-weight:900; font-size:0.7rem;">LIVE</div>
    <div id="news-ticker" style="padding:0 20px; font-size:0.8rem; color:var(--primary); white-space:nowrap; animation: scrollText 20s linear infinite;"></div>
</div>

<script>
/* --- GAME ENGINE --- */
const game = {
    state: {
        player: {
            name: "WONDERKID", pos: "ST", club: "Free Agent",
            ovr: 20, bank: 500, wage: 0, week: 1, energy: 100,
            stats: { pace: 25, stamina: 25, strength: 25, shooting: 25, passing: 25, dribbling: 25, defending: 10, vision: 25, composure: 25 }
        },
        league: [
            { name: "YOU", w:0, d:0, l:0, pts:0, pwr: 25 },
            { name: "Limerick City", w:0, d:0, l:0, pts:0, pwr: 20 },
            { name: "Dublin Utd", w:0, d:0, l:0, pts:0, pwr: 25 },
            { name: "Manchester Blue", w:0, d:0, l:0, pts:0, pwr: 88 },
            { name: "Madrid Gold", w:0, d:0, l:0, pts:0, pwr: 92 }
        ]
    }
};

const controller = {
    init() {
        this.renderStats();
        this.updateGlobalUI();
        market.init();
        world.init();
        legacy.init();
        lifestyle.init();
    },

    renderStats() {
        const groups = {
            'phys-stats': ['pace', 'stamina', 'strength'],
            'tech-stats': ['shooting', 'passing', 'dribbling', 'defending', 'vision', 'composure']
        };
        Object.keys(groups).forEach(id => {
            document.getElementById(id).innerHTML = groups[id].map(s => `
                <div class="attr-row">
                    <span style="font-size:0.7rem; width:80px; text-transform:uppercase;">${s}</span>
                    <div class="attr-bar-bg"><div class="attr-bar-fill" id="fill-${s}"></div></div>
                    <span id="val-${s}" style="width:30px; text-align:right; font-weight:bold;">${game.state.player.stats[s]}</span>
                    <button onclick="controller.train('${s}')" class="train-mini-btn">+</button>
                </div>
            `).join('');
        });
    },

    train(s) {
        if(game.state.player.energy < 15) return this.logFeed("Too tired! Rest for a week.", "var(--accent)");
        const current = game.state.player.stats[s];
        const cost = current > 80 ? 30 : current > 50 ? 20 : 15;
        game.state.player.stats[s]++;
        game.state.player.energy -= cost;
        this.updateGlobalUI();
    },

    updateGlobalUI() {
        const p = game.state.player;
        p.ovr = Math.floor(Object.values(p.stats).reduce((a,b)=>a+b)/9);
        document.getElementById('ui-ovr').innerText = p.ovr;
        document.getElementById('ui-bank').innerText = p.bank.toLocaleString();
        document.getElementById('ui-week').innerText = p.week;
        document.getElementById('ui-club').innerText = p.club.toUpperCase();
        document.getElementById('ui-wage').innerText = p.wage.toLocaleString();
        Object.keys(p.stats).forEach(s => {
            const fill = document.getElementById(`fill-${s}`);
            if(fill) fill.style.width = p.stats[s] + "%";
            const val = document.getElementById(`val-${s}`);
            if(val) val.innerText = p.stats[s];
        });
    },

    logFeed(msg, color="#888") {
        const f = document.getElementById('feed');
        const e = document.createElement('div');
        e.style.color = color; e.innerText = `> ${msg}`;
        f.prepend(e);
    },

    startMatchSimulation() {
        if(world.status.isInjured) return alert("You are injured!");
        if(game.state.player.energy < 30) return alert("Too exhausted to play!");
        const btn = document.getElementById('match-trigger');
        btn.disabled = true;
        let clock = 0; let pS = 0; let oS = 0;
        const matchInterval = setInterval(() => {
            clock += 5;
            document.getElementById('player-sprite').style.left = Math.random()*80+"%";
            document.getElementById('player-sprite').style.top = Math.random()*80+"%";
            document.getElementById('ball').style.left = document.getElementById('player-sprite').style.left;
            document.getElementById('ball').style.top = document.getElementById('player-sprite').style.top;
            if(Math.random()*100 < game.state.player.stats.shooting/8) { pS++; this.logFeed(`${clock}' - GOAL! You scored!`, "var(--primary)"); }
            else if(Math.random()>0.95) { oS++; this.logFeed(`${clock}' - Goal conceded.`, "var(--accent)"); }
            if(clock >= 90) { clearInterval(matchInterval); btn.disabled = false; this.finalizeMatch(pS, oS); }
        }, 200);
    },

    finalizeMatch(me, opp) {
        let pts = me > opp ? 3 : me === opp ? 1 : 0;
        game.state.player.bank += (pts * 100) + 50;
        game.state.player.energy -= 30;
        this.advanceTime();
    },

    advanceTime() {
        game.state.player.week++;
        game.state.player.bank += game.state.player.wage;
        game.state.player.energy = Math.min(100, game.state.player.energy + 40);
        lifestyle.updateFollowers(0.1);
        this.updateGlobalUI();
        market.renderMarket();
        world.updateLeagueDisplay();
    }
};

const market = {
    clubs: [
        { name: "Limerick City", tier: 3, wage: 200, req: 0, color: "#00f" },
        { name: "Dublin Utd", tier: 3, wage: 500, req: 25, color: "#f00" },
        { name: "London Blue", tier: 2, wage: 15000, req: 70, color: "#00a" },
        { name: "Madrid Gold", tier: 1, wage: 80000, req: 88, color: "#fb0" }
    ],
    init() { this.renderMarket(); },
    renderMarket() {
        const m = document.getElementById('market-list');
        m.innerHTML = this.clubs.filter(c => game.state.player.ovr >= c.req && c.name !== game.state.player.club).map(c => `
            <div class="transfer-item">
                <span style="font-size:0.8rem;">${c.name}</span>
                <button onclick="market.openNegotiation('${c.name}', ${c.wage})" class="negotiate-btn">SIGN</button>
            </div>
        `).join('');
    },
    openNegotiation(name, wage) {
        document.getElementById('modal-decision').style.display = 'flex';
        document.getElementById('decision-title').innerText = "TRANSFER OFFER";
        document.getElementById('decision-desc').innerText = `Join ${name} for €${wage.toLocaleString()}/wk?`;
        document.getElementById('decision-options').innerHTML = `
            <button class="btn-elite" onclick="market.accept('${name}', ${wage})">ACCEPT</button>
            <button class="btn-elite" style="background:#222; color:#fff; margin-top:10px;" onclick="market.close()">DECLINE</button>
        `;
    },
    accept(n, w) {
        game.state.player.club = n; game.state.player.wage = w;
        this.close(); controller.updateGlobalUI();
    },
    close() { document.getElementById('modal-decision').style.display='none'; }
};

const lifestyle = {
    assets: [
        { id: 'car', name: "Sport Car", price: 50000, rec: 5 },
        { id: 'villa', name: "Modern Villa", price: 1000000, rec: 20 }
    ],
    state: { followers: 100, owned: [] },
    init() { this.renderShop(); },
    updateFollowers(perf) { this.state.followers += Math.floor(game.state.player.ovr * 2); document.getElementById('ui-followers').innerText = this.state.followers.toLocaleString(); },
    renderShop() {
        document.getElementById('lifestyle-list').innerHTML = this.assets.map(a => `
            <div class="transfer-item">
                <span>${a.name}</span>
                <button onclick="lifestyle.buy('${a.id}')" class="negotiate-btn">€${a.price.toLocaleString()}</button>
            </div>
        `).join('');
    },
    buy(id) {
        const a = this.assets.find(x => x.id === id);
        if(game.state.player.bank >= a.price) {
            game.state.player.bank -= a.price; this.state.owned.push(id);
            alert("Purchased!"); controller.updateGlobalUI();
        }
    }
};

const world = {
    status: { isInjured: false, injuryWeeks: 0 },
    init() { document.getElementById('news-ticker').innerText = "Welcome to the Pro League. Scouting is active."; },
    updateLeagueDisplay() { }
};

const legacy = {
    state: { age: 17, goals: 0 },
    init() {
        const saved = localStorage.getItem('FOOTBALL_PRO_SAVE');
        if(saved) {
            const d = JSON.parse(saved);
            game.state.player = d.p; legacy.state = d.l;
            controller.updateGlobalUI();
        }
        setInterval(() => this.save(), 10000);
    },
    save() {
        localStorage.setItem('FOOTBALL_PRO_SAVE', JSON.stringify({p: game.state.player, l: legacy.state}));
    }
};

function switchTab(t) {
    document.getElementById('main-view').style.display = t === 'hub' ? 'grid' : 'none';
    document.getElementById('tab-lifestyle').style.display = t === 'lifestyle' ? 'grid' : 'none';
    document.getElementById('nav-hub').classList.toggle('active', t==='hub');
    document.getElementById('nav-lifestyle').classList.toggle('active', t==='lifestyle');
}

controller.init();
</script>
</body>
</html>
