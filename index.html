<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOTBALL PRO: GLOBAL CAREER</title>
    <style>
        :root {
            --neon-green: #00ff88; --pitch: #0a0f0d; --gold: #ffd700;
            --ui-blue: #0077ff; --panel-bg: #151a1e; --text: #e0e0e0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--pitch); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Navigation */
        .nav-sidebar { width: 80px; background: #000; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 30px; border-right: 1px solid #333; }
        .nav-item { cursor: pointer; opacity: 0.5; transition: 0.3s; font-size: 1.5rem; }
        .nav-item:hover, .nav-item.active { opacity: 1; color: var(--neon-green); }

        /* Layout Panels */
        .main-container { flex: 1; display: grid; grid-template-columns: 350px 1fr 380px; gap: 2px; background: #333; }
        .column { background: var(--panel-bg); padding: 25px; overflow-y: auto; }

        /* Player Identity Card */
        .player-card { background: linear-gradient(145deg, #1e252b, #151a1e); border-radius: 20px; padding: 20px; border: 1px solid #ffffff10; text-align: center; }
        .ovr-large { font-size: 4rem; font-weight: 900; color: var(--gold); line-height: 1; margin: 10px 0; text-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .badge { display: inline-block; padding: 4px 12px; background: var(--ui-blue); border-radius: 20px; font-size: 0.7rem; font-weight: bold; }

        /* Visual Match Engine */
        #pitch-container { width: 100%; height: 400px; background: #1a472a; border-radius: 15px; position: relative; overflow: hidden; border: 4px solid #2d5a3f; margin-bottom: 20px; }
        .grass-line { position: absolute; width: 100%; height: 2px; background: rgba(255,255,255,0.1); }
        #player-dot { width: 15px; height: 15px; background: var(--neon-green); border-radius: 50%; position: absolute; transition: 0.5s ease-out; box-shadow: 0 0 10px var(--neon-green); }
        #ball-dot { width: 10px; height: 10px; background: white; border-radius: 50%; position: absolute; transition: 0.3s; }

        /* Stats Grid */
        .attribute-group { margin-bottom: 25px; }
        .attribute-group h4 { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #333; }
        .stat-bar-container { margin-bottom: 10px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; }
        .stat-fill-bg { height: 4px; background: #000; border-radius: 2px; overflow: hidden; }
        .stat-fill { height: 100%; background: var(--neon-green); width: 0%; transition: 1s; }

        /* Interactive Elements */
        .btn-premium { background: var(--neon-green); color: black; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-premium:hover { transform: scale(1.02); filter: brightness(1.2); }
        .btn-premium:disabled { background: #333; color: #666; transform: none; cursor: not-allowed; }

        /* Transfer Market */
        .transfer-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 10px; border: 1px solid #ffffff05; }
        .club-info { display: flex; align-items: center; gap: 10px; }
        .club-logo { width: 30px; height: 30px; background: #444; border-radius: 5px; }

        /* Decision Events */
        #event-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1f24; width: 500px; padding: 30px; border-radius: 20px; border: 2px solid var(--neon-green); z-index: 1000; display: none; box-shadow: 0 0 100px rgba(0,0,0,0.8); }

        .currency { color: var(--neon-green); font-weight: bold; }
        .week-display { font-size: 2rem; font-weight: bold; color: #444; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="nav-sidebar">
    <div class="nav-item active" title="Hub">🏠</div>
    <div class="nav-item" title="Training">🏋️</div>
    <div class="nav-item" title="Transfer Market">🌍</div>
    <div class="nav-item" title="Lifestyle">💎</div>
    <div class="nav-item" title="Settings">⚙️</div>
</div>

<div class="main-container">
    <div class="column">
        <div class="player-card">
            <span class="badge" id="player-tier">PROSPECT</span>
            <div class="ovr-large" id="ui-ovr">15</div>
            <h2 id="ui-name">J. DOE</h2>
            <p style="color:#888; font-size: 0.8rem;" id="ui-club">LIMERICK CITY</p>
        </div>

        <div style="margin-top: 30px;">
            <div class="attribute-group">
                <h4>Physicality</h4>
                <div id="stats-physical"></div>
            </div>
            <div class="attribute-group">
                <h4>Technical</h4>
                <div id="stats-technical"></div>
            </div>
            <div class="attribute-group">
                <h4>Mental</h4>
                <div id="stats-mental"></div>
            </div>
        </div>
    </div>

    <div class="column">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span class="week-display">WEEK <span id="ui-week">1</span></span>
            <div style="text-align: right;">
                <p>BANK: <span class="currency">€<span id="ui-bank">0</span></span></p>
                <p>WAGE: <span style="color:#888; font-size: 0.7rem;">€<span id="ui-wage">100</span>/WK</span></p>
            </div>
        </div>

        <div id="pitch-container">
            <div id="player-dot"></div>
            <div id="ball-dot"></div>
            <div style="top:20%" class="grass-line"></div>
            <div style="top:40%" class="grass-line"></div>
            <div style="top:60%" class="grass-line"></div>
            <div style="top:80%" class="grass-line"></div>
        </div>

        <div id="match-log" style="height: 200px; overflow-y: auto; background: #000; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 0.8rem; margin-bottom: 20px;">
            <div style="color:var(--neon-green)">> ENGINE INITIALIZED. AWAITING FIXTURE...</div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn-premium" id="btn-match" onclick="engine.startMatch()">PLAY MATCH</button>
            <button class="btn-premium" style="background:#222; color:white;" onclick="engine.advanceWeek()">REST WEEK</button>
        </div>
    </div>

    <div class="column">
        <h3>TRANSFER MARKET</h3>
        <p style="font-size: 0.7rem; color:#666; margin-bottom: 15px;">TOP OFFERS BASED ON YOUR OVR</p>
        <div id="ui-market"></div>

        <h3 style="margin-top: 40px;">LEAGUE TABLE</h3>
        <table style="width: 100%; font-size: 0.8rem; margin-top: 10px;">
            <thead style="color:#666"><tr><th>CLUB</th><th>W</th><th>PTS</th></tr></thead>
            <tbody id="ui-league"></tbody>
        </table>
    </div>
</div>

<div id="event-popup">
    <h2 id="event-title">RANDOM EVENT</h2>
    <p id="event-desc" style="margin: 15px 0; color:#bbb;"></p>
    <div id="event-options" style="display:flex; flex-direction:column; gap:10px;"></div>
</div>

<script>
/**
 * FOOTBALL PRO ENGINE v1.0
 * Deep Simulation Architecture
 */

const engine = {
    state: {
        player: {
            name: "WONDERKID",
            ovr: 15,
            bank: 500,
            wage: 150,
            club: "Limerick City",
            week: 1,
            energy: 100,
            marketValue: 1200000,
            stats: {
                pace: 20, stamina: 20, strength: 20,
                shooting: 15, passing: 15, dribbling: 15, defending: 10,
                vision: 15, composure: 15, aggression: 10
            }
        },
        league: [
            { name: "Limerick City", pts: 0, w: 0, power: 15 },
            { name: "Dublin FC", pts: 0, w: 0, power: 18 },
            { name: "Cork Utd", pts: 0, w: 0, power: 14 },
            { name: "Galway Rovers", pts: 0, w: 0, power: 12 },
            { name: "London Blue", pts: 0, w: 0, power: 85 },
            { name: "Madrid Gold", pts: 0, w: 0, power: 92 },
            { name: "Munich Red", pts: 0, w: 0, power: 88 }
        ],
        activeMatch: false
    },

    init() {
        this.renderStats();
        this.updateUI();
        this.renderMarket();
        this.renderLeague();
    },

    renderStats() {
        const groups = {
            physical: ['pace', 'stamina', 'strength'],
            technical: ['shooting', 'passing', 'dribbling', 'defending'],
            mental: ['vision', 'composure', 'aggression']
        };

        Object.keys(groups).forEach(group => {
            const container = document.getElementById(`stats-${group}`);
            container.innerHTML = groups[group].map(s => `
                <div class="stat-bar-container">
                    <div class="stat-label">
                        <span style="text-transform:capitalize">${s}</span>
                        <span id="val-${s}">${this.state.player.stats[s]}</span>
                    </div>
                    <div class="stat-fill-bg">
                        <div class="stat-fill" id="fill-${s}" style="width: ${this.state.player.stats[s]}%"></div>
                    </div>
                    <button onclick="engine.train('${s}')" style="font-size:0.6rem; background:none; border:1px solid #444; color:#888; padding:2px 5px; margin-top:5px; cursor:pointer">TRAIN</button>
                </div>
            `).join('');
        });
    },

    updateUI() {
        const p = this.state.player;
        p.ovr = Math.floor(Object.values(p.stats).reduce((a,b) => a+b) / 10);
        
        document.getElementById('ui-ovr').innerText = p.ovr;
        document.getElementById('ui-bank').innerText = p.bank.toLocaleString();
        document.getElementById('ui-wage').innerText = p.wage;
        document.getElementById('ui-week').innerText = p.week;
        document.getElementById('ui-club').innerText = p.club.toUpperCase();

        // Update fill bars
        Object.keys(p.stats).forEach(s => {
            const fill = document.getElementById(`fill-${s}`);
            if(fill) fill.style.width = p.stats[s] + "%";
            const val = document.getElementById(`val-${s}`);
            if(val) val.innerText = p.stats[s];
        });
    },

    train(stat) {
        if(this.state.player.energy < 15) return this.log("Too tired to train! Rest for a week.");
        this.state.player.stats[stat] += 1;
        this.state.player.energy -= 15;
        this.updateUI();
        this.log(`Trained ${stat}. Energy is now ${this.state.player.energy}%`);
    },

    log(msg, color = "white") {
        const console = document.getElementById('match-log');
        const entry = document.createElement('div');
        entry.style.color = color;
        entry.innerText = `> ${msg}`;
        console.prepend(entry);
    },

    startMatch() {
        if(this.state.player.energy < 30) return this.log("Injured or too tired! You must rest.", "red");
        
        const btn = document.getElementById('btn-match');
        btn.disabled = true;
        this.state.activeMatch = true;
        this.state.player.energy -= 30;

        let clock = 0;
        let pScore = 0;
        let oScore = 0;
        const opp = this.state.league[Math.floor(Math.random() * 4)]; // Play local league

        this.log(`MATCH START: ${this.state.player.club} vs ${opp.name}`, var(--neon-green));

        const matchTimer = setInterval(() => {
            clock += 5;
            this.moveVisuals();

            if(Math.random() * 100 < (this.state.player.stats.shooting / 2)) {
                pScore++;
                this.log(`${clock}' - GOAL! Clinical finish by ${this.state.player.name}!`, "gold");
            } else if (Math.random() * 100 > 90) {
                oScore++;
                this.log(`${clock}' - Defeat in the box! ${opp.name} scores.`, "red");
            }

            if(clock >= 90) {
                clearInterval(matchTimer);
                this.endMatch(pScore, oScore, opp);
                btn.disabled = false;
            }
        }, 300);
    },

    moveVisuals() {
        const dot = document.getElementById('player-dot');
        const ball = document.getElementById('ball-dot');
        dot.style.left = Math.random() * 80 + "%";
        dot.style.top = Math.random() * 80 + "%";
        ball.style.left = dot.style.left;
        ball.style.top = dot.style.top;
    },

    endMatch(me, oppScore, oppObj) {
        this.state.activeMatch = false;
        let bonus = 50;
        if(me > oppScore) {
            bonus = 200;
            this.state.player.bank += bonus;
            this.log(`FINAL: WIN ${me}-${oppScore}. Bonus €${bonus} awarded.`);
        } else {
            this.log(`FINAL: DRAW/LOSS ${me}-${oppScore}.`);
        }
        this.advanceWeek();
    },

    advanceWeek() {
        this.state.player.week++;
        this.state.player.bank += this.state.player.wage;
        this.state.player.energy = Math.min(100, this.state.player.energy + 50);
        this.log(`WEEK ${this.state.player.week}: Salary €${this.state.player.wage} paid.`);
        this.updateUI();
        this.renderMarket();
        if(this.state.player.week % 4 === 0) this.triggerEvent();
    },

    renderMarket() {
        const container = document.getElementById('ui-market');
        const offers = [
            { name: "Limerick City", wage: 150, req: 0 },
            { name: "Dublin FC", wage: 450, req: 30 },
            { name: "London Blue", wage: 12000, req: 75 },
            { name: "Madrid Gold", wage: 45000, req: 88 }
        ];

        container.innerHTML = offers.map(o => `
            <div class="transfer-row">
                <div class="club-info">
                    <div class="club-logo"></div>
                    <div>
                        <p style="font-weight:bold">${o.name}</p>
                        <p style="font-size:0.6rem; color:#888">€${o.wage}/week</p>
                    </div>
                </div>
                ${this.state.player.ovr >= o.req ? 
                    `<button onclick="engine.signClub('${o.name}', ${o.wage})" style="background:var(--neon-green); border:none; padding:5px 10px; border-radius:5px; cursor:pointer">SIGN</button>` : 
                    `<span style="color:#444; font-size:0.7rem">Req: ${o.req} OVR</span>`}
            </div>
        `).join('');
    },

    signClub(name, wage) {
        if(confirm(`Accept transfer to ${name}? Current club progress will reset.`)) {
            this.state.player.club = name;
            this.state.player.wage = wage;
            this.log(`TRANSFER COMPLETE: Welcome to ${name}!`, "gold");
            this.updateUI();
        }
    },

    renderLeague() {
        const table = document.getElementById('ui-league');
        const sorted = this.state.league.sort((a,b) => b.pts - a.pts);
        table.innerHTML = sorted.map(t => `
            <tr><td>${t.name}</td><td>${t.w}</td><td><b>${t.pts}</b></td></tr>
        `).join('');
    },

    triggerEvent() {
        const events = [
            {
                title: "LATE NIGHT PARTY",
                desc: "Teammates are going out. Staying out late will hurt your fitness but boost popularity.",
                options: [
                    { text: "Go out (-20 Stamina, +€500 Sponsor)", action: () => { engine.state.player.stats.stamina -= 5; engine.state.player.bank += 500; } },
                    { text: "Stay home (+10 Energy)", action: () => { engine.state.player.energy += 10; } }
                ]
            },
            {
                title: "NEW BOOT DEAL",
                desc: "A local brand wants you to wear their boots. Take the deal?",
                options: [
                    { text: "Accept (€1000, +2 Shooting)", action: () => { engine.state.player.bank += 1000; engine.state.player.stats.shooting += 2; } },
                    { text: "Decline", action: () => {} }
                ]
            }
        ];

        const ev = events[Math.floor(Math.random() * events.length)];
        const popup = document.getElementById('event-popup');
        document.getElementById('event-title').innerText = ev.title;
        document.getElementById('event-desc').innerText = ev.desc;
        const optCont = document.getElementById('event-options');
        optCont.innerHTML = "";
        
        ev.options.forEach(o => {
            const b = document.createElement('button');
            b.className = "btn-premium";
            b.style.fontSize = "0.7rem";
            b.innerText = o.text;
            b.onclick = () => { o.action(); popup.style.display = "none"; engine.updateUI(); };
            optCont.appendChild(b);
        });

        popup.style.display = "block";
    }
};

engine.init();
</script>
</body>
</html>
