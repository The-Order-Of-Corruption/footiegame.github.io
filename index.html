<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- ELITE GAMING UI FRAMEWORK --- */
        :root {
            --primary: #00ff88; --secondary: #00d4ff; --accent: #ff0055;
            --bg-dark: #080a0c; --panel: rgba(255, 255, 255, 0.03);
            --gold: #ffcc00; --text-main: #f0f0f0; --border: rgba(255,255,255,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
            background-image: radial-gradient(circle at 50% -20%, #1a2a22 0%, #080a0c 80%);
        }

        /* Side Navigation */
        .nav-rail { width: 90px; background: rgba(0,0,0,0.4); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 40px; z-index: 100; }
        .nav-btn { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; font-size: 1.4rem; border: 1px solid transparent; background: var(--panel); }
        .nav-btn:hover, .nav-btn.active { background: var(--primary); color: #000; transform: scale(1.1); box-shadow: 0 0 20px rgba(0,255,136,0.4); }

        /* Main Grid Layout */
        .app-shell { flex: 1; display: grid; grid-template-columns: 380px 1fr 400px; gap: 1px; background: var(--border); position: relative; }
        .view-column { background: var(--bg-dark); padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

        /* Component: Player Profile Card */
        .profile-card { background: linear-gradient(145deg, #121619, #0a0c0e); border-radius: 24px; padding: 25px; border: 1px solid var(--border); position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ovr-display { font-size: 5rem; font-weight: 900; color: var(--gold); line-height: 1; text-shadow: 0 0 30px rgba(255,204,0,0.3); }
        .pos-badge { position: absolute; top: 25px; right: 25px; background: var(--primary); color: #000; padding: 4px 12px; border-radius: 8px; font-weight: 900; font-size: 0.8rem; }

        /* Component: Visual Pitch */
        .match-arena { width: 100%; height: 450px; background: #143d24; border-radius: 20px; border: 5px solid #234d34; position: relative; overflow: hidden; box-shadow: inset 0 0 100px rgba(0,0,0,0.5); }
        .pitch-mowing { position: absolute; width: 100%; height: 10%; background: rgba(0,0,0,0.05); }
        #ball { width: 12px; height: 12px; background: #fff; border-radius: 50%; position: absolute; transition: 0.3s; z-index: 10; box-shadow: 0 0 10px #fff; }
        #player-sprite { width: 20px; height: 20px; background: var(--primary); border: 2px solid #fff; border-radius: 50%; position: absolute; transition: 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); z-index: 11; box-shadow: 0 0 15px var(--primary); }

        /* Attribute Styling */
        .attr-group { background: var(--panel); border-radius: 15px; padding: 15px; border: 1px solid var(--border); }
        .attr-header { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        .attr-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .attr-bar-bg { flex: 1; height: 6px; background: #000; border-radius: 3px; margin: 0 15px; overflow: hidden; }
        .attr-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 1.5s cubic-bezier(0.075, 0.82, 0.165, 1); }

        /* Buttons & Actions */
        .btn-elite { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 14px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; width: 100%; }
        .btn-elite:hover:not(:disabled) { background: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,255,136,0.3); }
        .btn-elite:disabled { background: #222; color: #555; cursor: not-allowed; }

        /* Transfer Table */
        .transfer-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: var(--panel); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .club-name { font-weight: bold; font-size: 0.9rem; }
        .wage-tag { font-size: 0.7rem; color: var(--primary); }

        /* Popup Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .decision-card { width: 500px; background: #121518; border: 1px solid var(--primary); padding: 40px; border-radius: 30px; text-align: center; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>

    trainAttribute(key) {
        if (game.state.player.energy < 15) {

        }

        game.state.player.stats[key] += 1;

        this.logFeed(`TRAINING: Improved ${key.toUpperCase()} (+1). Energy: ${game.state.player.energy}%`);

    /* --- MODULE: MATCH ENGINE PHYSICS --- */
    startMatchSimulation() {
        if (game.state.player.energy < 35) {
            this.logFeed("MEDICAL: High risk of injury. Energy below 35%. Match canceled.", "var(--accent)");
            return;
        }

        const arena = document.getElementById('arena');
        const player = document.getElementById('player-sprite');
        const ball = document.getElementById('ball');
        const matchBtn = document.getElementById('match-trigger');

        matchBtn.disabled = true;
        game.state.player.energy -= 35;
        let minute = 0;
        let myGoals = 0;
        let oppGoals = 0;
        
        const matchLoop = setInterval(() => {
            minute += 2;
            
            // 2D Movement Physics
            const pX = Math.random() * 80 + 10;
            const pY = Math.random() * 80 + 10;
            player.style.left = `${pX}%`;
            player.style.top = `${pY}%`;

            // Ball follows player based on Dribbling stat
            const dribbleError = (100 - game.state.player.stats.dribbling) / 5;
            ball.style.left = `${pX + (Math.random() * dribbleError - dribbleError/2)}%`;
            ball.style.top = `${pY + (Math.random() * dribbleError - dribbleError/2)}%`;

            // Goal Logic
            if (minute % 10 === 0) {
                const shotChance = (game.state.player.stats.shooting + game.state.player.stats.vision) / 2.5;
                if (Math.random() * 100 < shotChance / 10) {
                    myGoals++;
                    this.logFeed(`${minute}' - GOAL! Clinical strike into the top corner!`, "var(--primary)");
                    this.triggerGoalFlash();
                }

                // Opponent attack logic
                if (Math.random() * 100 > 92) {
                    oppGoals++;
                    this.logFeed(`${minute}' - GOAL CONCEDED. Defense caught out of position.`, "var(--accent)");
                }
            }

            if (minute >= 90) {
                clearInterval(matchLoop);
                this.finalizeMatch(myGoals, oppGoals);
                matchBtn.disabled = false;
            }
        }, 150);
    },

    finalizeMatch(me, opp) {
        let earnings = 50;
        let pts = 0;

        if (me > opp) {
            earnings = 250 + (game.state.player.ovr * 10);
            pts = 3;
            this.logFeed(`MATCH END: Victory ${me}-${opp}! Bonus €${earnings} paid.`, "var(--gold)");
        } else if (me === opp) {
            earnings = 100;
            pts = 1;
            this.logFeed(`MATCH END: Draw ${me}-${opp}. Performance bonus €100.`, "white");
        } else {
            this.logFeed(`MATCH END: Defeat ${me}-${opp}. You learned from the loss.`, "#888");
        }

        game.state.player.bank += earnings;
        this.updateLeagueStats("YOU", pts, me, opp);
        this.advanceTime();
    },

    /* --- MODULE: WORLD SIMULATION --- */
    advanceTime() {
        game.state.player.week += 1;
        game.state.player.bank += game.state.player.wage;
        game.state.player.energy = Math.min(100, game.state.player.energy + 45);
        
        // Sim other teams
        game.state.league.forEach(team => {
            if (team.name !== "YOU") {
                const roll = Math.random();
                if (roll > 0.6) team.pts += 3;
                else if (roll > 0.4) team.pts += 1;
            }
        });

        this.updateGlobalUI();
        this.renderMarketOffers();
        this.renderLeagueTable();
        this.logFeed(`WEEK ${game.state.player.week}: New fixtures released. Salary credited.`);
    },

    logFeed(msg, color = "#888") {
        const feed = document.getElementById('feed');
        const entry = document.createElement('div');
        entry.style.color = color;
        entry.innerHTML = `> ${msg}`;
        feed.prepend(entry);
    },

    triggerGoalFlash() {
        const arena = document.getElementById('arena');
        arena.style.boxShadow = "0 0 50px var(--primary)";
        setTimeout(() => arena.style.boxShadow = "inset 0 0 100px rgba(0,0,0,0.5)", 500);
    }
};

/* --- MODULE: TRANSFER MARKET & SCOUTING SYSTEM --- */
const market = {
    // Database of 40+ Clubs across 3 Tiers
    clubs: [
        { name: "Limerick City", tier: 3, budget: 1000, rep: 10, color: "#00f" },
        { name: "Cork Athletic", tier: 3, budget: 1200, rep: 12, color: "#f00" },
        { name: "Dublin Rovers", tier: 3, budget: 1500, rep: 15, color: "#0f0" },
        { name: "Galway Utd", tier: 3, budget: 900, rep: 8, color: "#800080" },
        { name: "Belfast Stars", tier: 3, budget: 2000, rep: 18, color: "#ffa500" },
        
        { name: "London Blue", tier: 2, budget: 45000, rep: 65, color: "#0000ff" },
        { name: "Manchester Red", tier: 2, budget: 55000, rep: 70, color: "#ff0000" },
        { name: "Paris SG", tier: 2, budget: 90000, rep: 75, color: "#000080" },
        { name: "Dortmund Gold", tier: 2, budget: 40000, rep: 68, color: "#ffff00" },
        { name: "Milan AC", tier: 2, budget: 35000, rep: 62, color: "#000" },

        { name: "Madrid White", tier: 1, budget: 250000, rep: 92, color: "#fff" },
        { name: "Barcelona Garnet", tier: 1, budget: 220000, rep: 90, color: "#800000" },
        { name: "Munich Giants", tier: 1, budget: 280000, rep: 95, color: "#ff0000" },
        { name: "Manchester Light Blue", tier: 1, budget: 500000, rep: 98, color: "#add8e6" }
    ],

    init() {
        this.renderMarket();
    },

    // Generates offers based on your OVR and Reputation
    generateOffers() {
        const playerOvr = game.state.player.ovr;
        const availableOffers = [];

        this.clubs.forEach(club => {
            // Logic: Tier 3 needs 10-40 OVR, Tier 2 needs 45-75, Tier 1 needs 80+
            let isInterested = false;
            if (club.tier === 3 && playerOvr >= 0 && playerOvr < 50) isInterested = true;
            if (club.tier === 2 && playerOvr >= 45 && playerOvr < 80) isInterested = true;
            if (club.tier === 1 && playerOvr >= 78) isInterested = true;

            if (isInterested && club.name !== game.state.player.club) {
                // Calculate dynamic wage: Base + (OVR * Tier Multiplier)
                const baseWage = club.tier === 1 ? 50000 : club.tier === 2 ? 5000 : 200;
                const calculatedWage = baseWage + (playerOvr * (club.tier === 1 ? 1000 : 100));
                
                availableOffers.push({
                    club: club.name,
                    tier: club.tier,
                    wage: Math.floor(calculatedWage),
                    bonus: Math.floor(calculatedWage * 5), // Signing bonus is 5 weeks of wage
                    color: club.color
                });
            }
        });

        return availableOffers.slice(0, 5); // Show top 5 relevant offers
    },

    renderMarket() {
        const marketList = document.getElementById('market-list');
        const offers = this.generateOffers();

        if (offers.length === 0) {
            marketList.innerHTML = `<p style="color:#666; font-size:0.7rem;">No clubs are currently scouting you. Improve your OVR to attract interest.</p>`;
            return;
        }

        marketList.innerHTML = offers.map(o => `
            <div class="transfer-item">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:4px; height:30px; background:${o.color}"></div>
                    <div>
                        <span class="club-name">${o.club.toUpperCase()}</span><br>
                        <span class="wage-tag">€${o.wage.toLocaleString()}/WK</span>
                    </div>
                </div>
                <button onclick="market.openNegotiation('${o.club}', ${o.wage}, ${o.bonus})" class="negotiate-btn">VIEW</button>
            </div>
        `).join('');
    },

    openNegotiation(clubName, wage, bonus) {
        const modal = document.getElementById('modal-decision'); // We'll add this UI in Batch 4
        const title = document.getElementById('decision-title');
        const desc = document.getElementById('decision-desc');
        const options = document.getElementById('decision-options');

        title.innerText = `CONTRACT OFFER: ${clubName}`;
        desc.innerText = `The scouts from ${clubName} are impressed with your recent form. They are offering two contract paths:`;
        
        options.innerHTML = `

            </button>
            <button class="btn-elite" style="background:#222; color:#fff; margin-top:10px;" onclick="market.closeModal()">
                REJECT OFFER
            </button>
        `;

        modal.style.display = 'flex';

    acceptOffer(club, wage, bonus) {

        controller.updateGlobalUI();

/* --- MODULE: LIFESTYLE & BRAND MANAGEMENT --- */
const lifestyle = {
    // Assets provide passive bonuses to recovery or market value multipliers
    assets: [
        { id: 'car_1', name: "Used Hatchback", price: 5000, type: 'transport', bonus: "Small recovery boost", recoveryMod: 2, valueMult: 1.05 },
        { id: 'apt_1', name: "City Apartment", price: 50000, type: 'housing', bonus: "Resting is 10% more effective", recoveryMod: 5, valueMult: 1.2 },
        { id: 'car_2', name: "Italian Supercar", price: 250000, type: 'transport', bonus: "Massive Popularity spike", recoveryMod: 0, valueMult: 1.5 },
        { id: 'house_1', name: "Luxury Villa", price: 2000000, type: 'housing', bonus: "+20 Energy per week rest", recoveryMod: 20, valueMult: 2.0 },
        { id: 'jet_1', name: "Private Jet", price: 15000000, type: 'transport', bonus: "Global Icon status", recoveryMod: 0, valueMult: 5.0 }
    ],

    sponsorships: [
        { brand: "Swift-Foot (Boots)", minFollowers: 1000, weeklyPay: 500 },
        { brand: "Aura Energy (Drink)", minFollowers: 50000, weeklyPay: 5000 },
        { brand: "Titanium Watch Co.", minFollowers: 500000, weeklyPay: 50000 },
        { brand: "Global Airlines", minFollowers: 10000000, weeklyPay: 1000000 }
    ],

    state: {
        followers: 100,
        ownedAssets: [],
        activeSponsorships: []
    },

    init() {
        this.renderLifestyleShop();
        this.updateBrandUI();
    },

    // Grow followers based on OVR and match performance
    updateFollowers(performanceScore) {
        const growthBase = game.state.player.ovr * 10;
        const multiplier = performanceScore > 0 ? performanceScore : 1;
        const newFollowers = Math.floor(growthBase * multiplier * (Math.random() * 2));
        this.state.followers += newFollowers;
        
        this.checkSponsorships();
        this.updateBrandUI();
    },

    checkSponsorships() {
        this.sponsorships.forEach(s => {
            if (this.state.followers >= s.minFollowers && !this.state.activeSponsorships.includes(s.brand)) {
                this.state.activeSponsorships.push(s.brand);
                controller.logFeed(`SPONSORSHIP: ${s.brand} signed you! +€${s.weeklyPay.toLocaleString()}/wk`, "var(--primary)");
            }
        });
    },

    calculateWeeklyPassiveIncome() {
        let total = 0;
        this.sponsorships.forEach(s => {
            if (this.state.activeSponsorships.includes(s.brand)) total += s.weeklyPay;
        });
        return total;
    },

    renderLifestyleShop() {
        const container = document.getElementById('lifestyle-list'); // Need to ensure this ID exists in UI
        if (!container) return;

        container.innerHTML = this.assets.map(a => {
            const isOwned = this.state.ownedAssets.includes(a.id);
            return `
                <div class="transfer-item" style="border-color: ${isOwned ? 'var(--primary)' : 'rgba(255,255,255,0.1)'}">
                    <div>
                        <span class="club-name">${a.name.toUpperCase()}</span><br>
                        <span style="font-size:0.6rem; color:#888">${a.bonus}</span>
                    </div>
                    ${isOwned ? 
                        `<span style="color:var(--primary); font-size:0.7rem; font-weight:bold;">OWNED</span>` : 
                        `<button onclick="lifestyle.buyAsset('${a.id}')" class="negotiate-btn">€${a.price.toLocaleString()}</button>`
                    }
                </div>
            `;
        }).join('');
    },

    buyAsset(id) {
        const asset = this.assets.find(a => a.id === id);
        if (game.state.player.bank >= asset.price) {
            game.state.player.bank -= asset.price;
            this.state.ownedAssets.push(id);
            controller.logFeed(`PURCHASE: You now own ${asset.name}!`, "var(--gold)");
            this.renderLifestyleShop();
            controller.updateGlobalUI();
        } else {
            alert("Insufficient funds in your bank account!");
        }
    },

    updateBrandUI() {
        // This would update a 'Brand' tab if we had one, otherwise logs to feed
        const uiFollowers = document.getElementById('ui-followers');
        if (uiFollowers) uiFollowers.innerText = this.formatNumber(this.state.followers);
    },

    formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num;
    }
};

// We need to modify the advanceTime function from Batch 2 to include passive income
const originalAdvanceTime = controller.advanceTime;
controller.advanceTime = function() {
    // Add sponsorship money
    const extraCash = lifestyle.calculateWeeklyPassiveIncome();
    game.state.player.bank += extraCash;
    
    // Recovery boost from assets
    let bonusRecovery = 0;
    lifestyle.assets.forEach(a => {
        if (lifestyle.state.ownedAssets.includes(a.id)) bonusRecovery += a.recoveryMod;
    });
    game.state.player.energy = Math.min(100, game.state.player.energy + bonusRecovery);

    // Run original logic
    originalAdvanceTime.call(this);
    
    // Update Followers naturally every week
    lifestyle.updateFollowers(0.1); 
};

/* --- MODULE: LEAGUE HIERARCHY & MEDICAL ENGINE --- */
const world = {
    leagues: {
        3: { name: "Regional League", teams: ["Limerick City", "Cork Utd", "Galway Rovers", "Dublin City", "Belfast FC", "Waterford Utd"], promotion: true },
        2: { name: "Pro Continental", teams: ["Paris SG", "Milan AC", "Dortmund Gold", "London Blue", "Manchester Red", "Ajax Stars"], promotion: true, relegation: true },
        1: { name: "Elite World League", teams: ["Madrid White", "Munich Giants", "Manchester Light Blue", "Barcelona Garnet", "Turin Zebras", "London Red"], relegation: true }
    },

    status: {
        isInjured: false,
        injuryWeeks: 0,
        yellowCards: 0,
        isSuspended: false
    },

    init() {
        this.renderNewsTicker();
        this.updateLeagueDisplay();
    },

    // Dynamic News Generator
    generateNews(type, data = {}) {
        const ticker = document.getElementById('news-ticker');
        const news = {
            MATCH_WIN: `BREAKING: ${game.state.player.name} leads ${game.state.player.club} to a vital victory!`,
            TRANSFER_RUMOR: `RUMOR: Top Tier scouts spotted watching ${game.state.player.name} at recent fixture.`,
            INJURY: `MEDICAL: Heartbreak for ${game.state.player.name} - sidelined for ${data.weeks} weeks.`,
            PROMOTION: `HISTORY: ${game.state.player.club} have secured promotion to the next tier!`,
            GOAL: `STUNNER: Is there any stopping ${game.state.player.name}? Another goal added to the tally.`
        };

        const msg = news[type] || "League News: Season reaching a critical turning point.";
        ticker.innerHTML = `<span class="news-text">${msg}</span>`;
    },

    // Physical Health & Discipline Logic
    processPhysicality(intensity) {
        // Higher intensity training/matches = higher injury risk
        const riskFactor = (100 - game.state.player.stats.stamina) / 10;
        const roll = Math.random() * 100;

        if (roll < (riskFactor + intensity)) {
            const weeks = Math.floor(Math.random() * 4) + 1;
            this.status.isInjured = true;
            this.status.injuryWeeks = weeks;
            this.generateNews("INJURY", { weeks });
            controller.logFeed(`INJURY: You've suffered a muscle strain. Out for ${weeks} weeks.`, "var(--accent)");
            return true;
        }
        
        // Random Discipline (Yellow Cards)
        if (Math.random() * 100 < 5) {
            this.status.yellowCards++;
            controller.logFeed("DISCIPLINE: You received a Yellow Card for a late challenge.", "orange");
            if (this.status.yellowCards >= 3) {
                this.status.isSuspended = true;
                this.status.yellowCards = 0;
                controller.logFeed("SUSPENSION: Too many bookings. You are banned for 1 match.", "var(--accent)");
            }
        }
        return false;
    },

    updateLeagueDisplay() {
        const club = market.clubs.find(c => c.name === game.state.player.club);
        const currentLeague = this.leagues[club.tier];
        document.getElementById('ui-league-name').innerText = currentLeague.name.toUpperCase();
    }
};

/* --- OVERRIDING CORE FUNCTIONS FOR BATCH 5 LOGIC --- */
const preMatchCheck = controller.startMatchSimulation;
controller.startMatchSimulation = function() {
    if (world.status.isInjured) return alert(`You are currently injured for ${world.status.injuryWeeks} more weeks!`);
    if (world.status.isSuspended) {
        world.status.isSuspended = false;
        return alert("You are suspended for this match.");
    }
    
    // Check for injury during the match
    const gotInjured = world.processPhysicality(10); // 10% base match intensity
    if (!gotInjured) {
        preMatchCheck.call(this);
    }
};

const preWeekCheck = controller.advanceTime;
controller.advanceTime = function() {
    if (world.status.isInjured) {
        world.status.injuryWeeks--;
        if (world.status.injuryWeeks <= 0) {
            world.status.isInjured = false;
            controller.logFeed("MEDICAL: You have been cleared to play!", "var(--primary)");
        }
    }
    
    // Random News Generation
    if (Math.random() > 0.7) world.generateNews("TRANSFER_RUMOR");
    
    preWeekCheck.call(this);
    world.updateLeagueDisplay();
};

/* --- MODULE: LEGACY, AGING & GLOBAL SAVE SYSTEM --- */
const legacy = {
    state: {
        age: 17,
        totalGoals: 0,
        trophies: 0,
        careerEarnings: 0,
        isRetired: false,
        bestOvr: 0
    },

    init() {
        this.loadGame();
        this.startAutoSave();
        this.renderCareerStats();
    },

    // Aging Logic: Every 40 weeks = 1 year
    processAging() {
        if (game.state.player.week % 40 === 0) {
            this.state.age++;
            controller.logFeed(`BIRTHDAY: You are now ${this.state.age} years old!`, "var(--gold)");
            
            // Physical Decline starts at 30
            if (this.state.age >= 30) {
                this.applyPhysicalDecline();
            }
            
            // Forced Retirement at 40
            if (this.state.age >= 40) {
                this.retirePlayer();
            }
        }
    },

    applyPhysicalDecline() {
        const p = game.state.player.stats;
        p.pace = Math.max(10, p.pace - 2);
        p.stamina = Math.max(10, p.stamina - 2);
        controller.logFeed("AGING: Your physical attributes are beginning to decline.", "var(--accent)");
        controller.updateGlobalUI();
    },

    retirePlayer() {
        this.state.isRetired = true;
        const finalScore = (this.state.totalGoals * 10) + (this.state.trophies * 500) + (game.state.player.bank / 1000);
        
        const modal = document.getElementById('modal-decision');
        const title = document.getElementById('decision-title');
        const desc = document.getElementById('decision-desc');
        const options = document.getElementById('decision-options');

        title.innerText = "CAREER END: LEGEND STATUS";
        desc.innerHTML = `
            You have retired at age ${this.state.age}.<br><br>
            <b>GOALS:</b> ${this.state.totalGoals}<br>
            <b>TROPHIES:</b> ${this.state.trophies}<br>
            <b>FINAL WEALTH:</b> €${game.state.player.bank.toLocaleString()}<br>
            <b>GOAT SCORE:</b> ${Math.floor(finalScore)}
        `;
        options.innerHTML = `<button class="btn-elite" onclick="location.reload()">NEW CAREER</button>`;
        modal.style.display = 'flex';
    },

    // Persistence Logic
    saveGame() {
        const saveData = {
            player: game.state.player,
            legacy: this.state,
            lifestyle: lifestyle.state,
            world: world.status
        };
        localStorage.setItem('FOOTBALL_PRO_SAVE', JSON.stringify(saveData));
    },

    loadGame() {
        const saved = localStorage.getItem('FOOTBALL_PRO_SAVE');
        if (saved) {
            const data = JSON.parse(saved);
            game.state.player = data.player;
            this.state = data.legacy;
            lifestyle.state = data.lifestyle;
            world.status = data.world;
            controller.logFeed("SYSTEM: Career Loaded Successfully.", "var(--neon-green)");
        }
    },

    startAutoSave() {
        setInterval(() => this.saveGame(), 30000); // Save every 30 seconds
    },

    renderCareerStats() {
        // Adding a dedicated Career Stats display to the Profile Card
        const uiName = document.getElementById('ui-name');
        if (uiName) {
            const statsMini = document.createElement('div');
            statsMini.style = "font-size:0.6rem; color:#666; margin-top:10px; display:flex; justify-content:center; gap:15px;";
            statsMini.innerHTML = `
                <span>AGE: <b id="ui-age" style="color:white">${this.state.age}</b></span>
                <span>GOALS: <b id="ui-total-goals" style="color:white">${this.state.totalGoals}</b></span>
                <span>VALUE: <b id="ui-value" style="color:var(--neon-green)">€${(game.state.player.ovr * 1.5).toFixed(1)}M</b></span>
            `;
            uiName.after(statsMini);
        }
    }
};

/* --- FINAL INTEGRATION OVERRIDES --- */
// Hooking into Match End to track goals
const finalMatchLogic = controller.finalizeMatch;
controller.finalizeMatch = function(me, opp) {
    legacy.state.totalGoals += me;
    legacy.state.careerEarnings += (game.state.player.bank);
    if (me > opp && Math.random() > 0.9) {
        legacy.state.trophies++;
        world.generateNews("PROMOTION");
    }
    
    finalMatchLogic.call(this, me, opp);
    
    // Update the mini-stats
    document.getElementById('ui-total-goals').innerText = legacy.state.totalGoals;
    document.getElementById('ui-value').innerText = `€${(game.state.player.ovr * 1.5).toFixed(1)}M`;
};

const finalWeekLogic = controller.advanceTime;
controller.advanceTime = function() {
    if (legacy.state.isRetired) return;
    
    legacy.processAging();
    document.getElementById('ui-age').innerText = legacy.state.age;
    
    finalWeekLogic.call(this);
    legacy.saveGame(); // Save on every week advance
};

legacy.init();
