<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Pro: Evolution</title>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00aeff;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --gold: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Sidebar & Layout */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        
        .panel {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        h1, h2, h3 { color: var(--primary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* Stats Display */
        .rating-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 8px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 auto 15px;
            background: rgba(0, 255, 136, 0.1);
        }

        /* Training Grid */
        .training-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: 0.2s;
        }

        .stat-card:hover { background: rgba(255,255,255,0.07); }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #000;
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Match Engine UI */
        #match-console {
            background: #000;
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #00ff00;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        .match-log-entry { margin-bottom: 5px; border-left: 2px solid #333; padding-left: 8px; }

        /* Buttons */
        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { filter: grayscale(1); cursor: not-allowed; }

        /* League Table */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #94a3b8; font-size: 0.8rem; }
        td { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .currency-pill {
            background: var(--gold);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        /* Mobile */
        @media (max-width: 1000px) {
            body { grid-template-columns: 1fr; }
            .sidebar { order: 2; }
            .main-content { order: 1; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="panel">
        <h3>Player Profile</h3>
        <div class="rating-circle" id="overall-val">0</div>
        <p style="text-align:center; margin-bottom:10px;">Overall Rating</p>
        <div style="text-align:center">
            <span class="currency-pill">€ <span id="euros-val">0</span></span>
        </div>
        <hr style="margin:15px 0; opacity:0.1">
        <label>Name</label>
        <input type="text" id="p-name" placeholder="Wonderkid" style="width:100%; background:#000; border:1px solid #444; color:#fff; padding:5px; margin-bottom:10px;">
        <label>Position</label>
        <select id="p-pos" style="width:100%; background:#000; color:#fff; padding:5px;">
            <option value="ST">ST (Striker)</option>
            <option value="MID">MID (Midfielder)</option>
            <option value="DEF">DEF (Defender)</option>
            <option value="GK">GK (Goalkeeper)</option>
        </select>
    </div>

    <div class="panel">
        <h3>League Standings</h3>
        <p id="current-league" style="color: var(--gold); font-weight: bold;">Division 5: Sunday League</p>
        <table>
            <thead><tr><th>Team</th><th>P</th><th>Pts</th></tr></thead>
            <tbody id="league-body"></tbody>
        </table>
    </div>
</div>

<div class="main-content">
    <div class="panel">
        <h2>Live Match Engine</h2>
        <div id="match-console">
            <div class="match-log-entry">> Welcome to the League. Select a position and train to begin.</div>
        </div>
        <button id="btn-match" onclick="startProMatch()">Play Next League Match</button>
    </div>

    <div class="panel">
        <h2>Training Center</h2>
        <div class="training-grid" id="training-grid"></div>
    </div>
</div>

<div class="sidebar">
    <div class="panel">
        <h3>Market & Upgrades</h3>
        <button onclick="openPack('bronze')" style="margin-bottom:10px;">Bronze Pack (50€)</button>
        <button onclick="openPack('silver')" style="margin-bottom:10px; background: silver;">Silver Pack (150€)</button>
        <button onclick="openPack('gold')" style="background: var(--gold);">Gold Pack (500€)</button>
    </div>

    <div class="panel">
        <h3>Inventory</h3>
        <div id="inventory-list" style="font-size: 0.85rem; max-height: 300px; overflow-y: auto;"></div>
    </div>
</div>

<script>
    // --- DATA ---
    const stats = { Shooting: 10, Passing: 10, Dribbling: 10, Defending: 10, Speed: 10, Stamina: 10 };
    let euros = 100;
    let xp = 0;
    let division = 5;
    let leaguePoints = 0;
    let matchesPlayed = 0;
    let inventory = [];
    
    const leagueNames = ["", "Premier League", "Championship", "League One", "National League", "Sunday League"];
    
    // --- INITIALIZATION ---
    function init() {
        const grid = document.getElementById('training-grid');
        Object.keys(stats).forEach(stat => {
            grid.innerHTML += `
                <div class="stat-card">
                    <h4>${stat}</h4>
                    <div style="font-size: 1.5rem; font-weight:bold;">${stats[stat]}</div>
                    <div class="progress-container"><div class="progress-fill" id="fill-${stat}"></div></div>
                    <button onclick="train('${stat}')" id="btn-${stat}">Train</button>
                </div>
            `;
        });
        updateUI();
        updateLeagueTable();
    }

    // --- LOGIC ---
    function train(stat) {
        const btn = document.getElementById(`btn-${stat}`);
        const fill = document.getElementById(`fill-${stat}`);
        btn.disabled = true;
        
        let progress = 0;
        const interval = setInterval(() => {
            progress += 2;
            fill.style.width = progress + "%";
            if (progress >= 100) {
                clearInterval(interval);
                stats[stat]++;
                euros += 5;
                fill.style.width = "0%";
                btn.disabled = false;
                updateUI();
            }
        }, 50);
    }

    function updateUI() {
        document.getElementById('euros-val').innerText = euros;
        let avg = Object.values(stats).reduce((a,b) => a+b) / 6;
        document.getElementById('overall-val').innerText = Math.floor(avg);
    }

    function updateLeagueTable() {
        const tbody = document.getElementById('league-body');
        const teams = [
            { name: "You", pts: leaguePoints },
            { name: "Red Devils", pts: 12 },
            { name: "Blue Moon", pts: 10 },
            { name: "The Gunners", pts: 7 }
        ].sort((a,b) => b.pts - a.pts);

        tbody.innerHTML = teams.map(t => `<tr><td>${t.name}</td><td>${matchesPlayed}</td><td>${t.pts}</td></tr>`).join('');
    }

    // --- PRO MATCH ENGINE ---
    function startProMatch() {
        const btn = document.getElementById('btn-match');
        const consoleEl = document.getElementById('match-console');
        btn.disabled = true;
        consoleEl.innerHTML = '';
        
        let minute = 0;
        let myScore = 0;
        let oppScore = 0;
        
        const matchInterval = setInterval(() => {
            minute += 5;
            const log = document.createElement('div');
            log.className = 'match-log-entry';
            
            // Logic based on stats
            let eventRand = Math.random() * 100;
            if(eventRand > 85) {
                if(stats.Shooting + stats.Speed > Math.random() * 150) {
                    myScore++;
                    log.innerText = `${minute}' - GOAL! Brilliant finish by the Wonderkid! (${myScore}-${oppScore})`;
                    log.style.color = 'var(--primary)';
                } else {
                    log.innerText = `${minute}' - Chance missed! Needs more Shooting training.`;
                }
            } else if (eventRand < 15) {
                if(stats.Defending < Math.random() * 60) {
                    oppScore++;
                    log.innerText = `${minute}' - Goal conceded. Defense was caught sleeping. (${myScore}-${oppScore})`;
                    log.style.color = '#ff4444';
                } else {
                    log.innerText = `${minute}' - Great tackle! Clean defensive work.`;
                }
            } else {
                log.innerText = `${minute}' - Midfield battle continues...`;
            }

            consoleEl.appendChild(log);
            consoleEl.scrollTop = consoleEl.scrollHeight;

            if (minute >= 90) {
                clearInterval(matchInterval);
                finishMatch(myScore, oppScore);
                btn.disabled = false;
            }
        }, 400);
    }

    function finishMatch(me, opp) {
        matchesPlayed++;
        let reward = 20;
        if(me > opp) {
            leaguePoints += 3;
            reward = 100;
            alert("Victory! Earned 100€");
        } else if (me === opp) {
            leaguePoints += 1;
            reward = 40;
            alert("Draw! Earned 40€");
        } else {
            alert("Defeat. Earned 20€");
        }
        euros += reward;
        
        if(leaguePoints >= 15) {
            division--;
            leaguePoints = 0;
            matchesPlayed = 0;
            alert("PROMOTED! You are now in Division " + division);
            document.getElementById('current-league').innerText = `Division ${division}: ${leagueNames[division]}`;
        }
        
        updateUI();
        updateLeagueTable();
    }

    function openPack(tier) {
        const costs = { bronze: 50, silver: 150, gold: 500 };
        if(euros < costs[tier]) return alert("Not enough money!");
        
        euros -= costs[tier];
        const items = ["Speed Boots", "Golden Whistle", "Energy Drink", "Elite Coach", "Titanium Shinguards"];
        const item = items[Math.floor(Math.random()*items.length)];
        
        inventory.push(item);
        document.getElementById('inventory-list').innerHTML += `<div>📦 ${tier.toUpperCase()}: ${item}</div>`;
        
        // Randomly boost a stat for opening a pack
        const s = Object.keys(stats);
        stats[s[Math.floor(Math.random()*s.length)]] += 2;
        
        updateUI();
    }

    init();
</script>

</body>
</html>
